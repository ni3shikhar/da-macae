# =============================================================================
# AGENTRA :: CD Pipeline - Deploy to Azure
# =============================================================================
# Flow: Setup -> Deploy Infra (creates ACR) -> Build & Push -> Deploy Apps
# Environments: dev (auto on develop), staging (auto on main), prod (manual)
# =============================================================================

name: CD - Deploy to Azure

on:
  push:
    branches:
      - develop
      - main
    paths-ignore:
      - '**.md'
      - 'docs/**'
      - '.vscode/**'
  workflow_dispatch:
    inputs:
      environment:
        description: 'Target environment'
        required: true
        type: choice
        options:
          - dev
          - staging
          - prod
        default: dev
      skip_infra:
        description: 'Skip infrastructure provisioning'
        required: false
        type: boolean
        default: false

concurrency:
  group: deploy-${{ github.event.inputs.environment || (github.ref == 'refs/heads/main' && 'staging') || 'dev' }}
  cancel-in-progress: false

permissions:
  id-token: write
  contents: read

env:
  DOCKER_BUILDKIT: 1

jobs:
  # ── Determine Environment ──────────────────────────────────────────────────
  setup:
    name: Setup
    runs-on: ubuntu-latest
    outputs:
      environment: ${{ steps.env.outputs.environment }}
      image_tag: ${{ steps.env.outputs.image_tag }}
    steps:
      - name: Determine environment
        id: env
        run: |
          if [ "${{ github.event_name }}" == "workflow_dispatch" ]; then
            echo "environment=${{ github.event.inputs.environment }}" >> $GITHUB_OUTPUT
          elif [ "${{ github.ref }}" == "refs/heads/main" ]; then
            echo "environment=staging" >> $GITHUB_OUTPUT
          else
            echo "environment=dev" >> $GITHUB_OUTPUT
          fi
          echo "image_tag=${{ github.sha }}" >> $GITHUB_OUTPUT

  # ── Step 1: Deploy Infrastructure ──────────────────────────────────────────
  # Must run FIRST so ACR and other resources exist before image push
  deploy-infra:
    name: Deploy Infrastructure
    runs-on: ubuntu-latest
    needs: [setup]
    if: ${{ github.event.inputs.skip_infra != 'true' }}
    environment: ${{ needs.setup.outputs.environment }}
    outputs:
      acr_name: ${{ steps.acr.outputs.name }}
      acr_login_server: ${{ steps.acr.outputs.login_server }}

    steps:
      - uses: actions/checkout@v4

      - name: Azure Login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Install Azure Developer CLI
        uses: Azure/setup-azd@v2

      - name: Get admin object ID
        id: admin
        run: |
          ADMIN_OID=$(az ad sp show --id ${{ secrets.AZURE_CLIENT_ID }} --query id -o tsv)
          echo "object_id=$ADMIN_OID" >> $GITHUB_OUTPUT

      - name: AZD Provision
        env:
          AZURE_ENV_NAME: ${{ needs.setup.outputs.environment }}
          AZURE_LOCATION: ${{ vars.AZURE_LOCATION }}
          AZURE_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
        run: |
          azd auth login \
            --client-id "${{ secrets.AZURE_CLIENT_ID }}" \
            --federated-credential-provider "github" \
            --tenant-id "${{ secrets.AZURE_TENANT_ID }}"

          azd env new ${{ needs.setup.outputs.environment }} || true
          azd env select ${{ needs.setup.outputs.environment }}
          azd env set AZURE_LOCATION "${{ vars.AZURE_LOCATION }}"
          azd env config set infra.parameters.adminObjectId "${{ steps.admin.outputs.object_id }}"
          azd env config set infra.parameters.environment "${{ needs.setup.outputs.environment }}"
          azd env config set infra.parameters.projectName "damacae"

          azd provision --no-prompt

      - name: Get ACR details from deployed resources
        id: acr
        run: |
          ENV="${{ needs.setup.outputs.environment }}"
          RG="damacae-rg-${ENV}"
          if [ "$ENV" == "prod" ]; then RG="damacae-rg"; fi

          ACR_NAME=$(az acr list -g "$RG" --query "[0].name" -o tsv 2>/dev/null || echo "")
          ACR_SERVER=$(az acr list -g "$RG" --query "[0].loginServer" -o tsv 2>/dev/null || echo "")
          echo "name=${ACR_NAME}" >> $GITHUB_OUTPUT
          echo "login_server=${ACR_SERVER}" >> $GITHUB_OUTPUT
          echo "::notice::ACR: ${ACR_NAME} (${ACR_SERVER})"

      - name: Upload AZD environment state
        uses: actions/upload-artifact@v4
        with:
          name: azd-env-${{ needs.setup.outputs.environment }}
          path: .azure/
          retention-days: 1

  # ── Step 2: Build & Push Container Images ──────────────────────────────────
  # Runs AFTER infra so ACR exists to receive images
  build-push:
    name: Build & Push - ${{ matrix.target }}
    runs-on: ubuntu-latest
    needs: [setup, deploy-infra]
    if: ${{ always() && (needs.deploy-infra.result == 'success' || needs.deploy-infra.result == 'skipped') }}
    environment: ${{ needs.setup.outputs.environment }}
    strategy:
      matrix:
        include:
          - target: backend
            image_name: agentra-backend
          - target: frontend
            image_name: agentra-frontend
          - target: mcp-server
            image_name: agentra-mcp

    steps:
      - uses: actions/checkout@v4

      - name: Azure Login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Determine ACR
        id: acr
        run: |
          ACR_NAME="${{ needs.deploy-infra.outputs.acr_name }}"
          ACR_SERVER="${{ needs.deploy-infra.outputs.acr_login_server }}"
          if [ -z "$ACR_NAME" ] || [ "$ACR_NAME" == "" ]; then
            ACR_NAME="${{ vars.ACR_NAME }}"
            ACR_SERVER="${{ vars.ACR_LOGIN_SERVER }}"
          fi
          echo "name=${ACR_NAME}" >> $GITHUB_OUTPUT
          echo "login_server=${ACR_SERVER}" >> $GITHUB_OUTPUT
          echo "Using ACR: ${ACR_NAME} (${ACR_SERVER})"

      - name: Login to ACR
        run: az acr login --name ${{ steps.acr.outputs.name }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push ${{ matrix.target }}
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          target: ${{ matrix.target }}
          push: true
          tags: |
            ${{ steps.acr.outputs.login_server }}/${{ matrix.image_name }}:${{ needs.setup.outputs.image_tag }}
            ${{ steps.acr.outputs.login_server }}/${{ matrix.image_name }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ── Step 3: Deploy Applications ────────────────────────────────────────────
  deploy-apps:
    name: Deploy Applications
    runs-on: ubuntu-latest
    needs: [setup, build-push, deploy-infra]
    if: ${{ always() && needs.build-push.result == 'success' }}
    environment:
      name: ${{ needs.setup.outputs.environment }}
      url: ${{ steps.endpoints.outputs.frontend_url }}

    steps:
      - uses: actions/checkout@v4

      - name: Azure Login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Install Azure Developer CLI
        uses: Azure/setup-azd@v2

      - name: Download AZD environment state
        uses: actions/download-artifact@v4
        with:
          name: azd-env-${{ needs.setup.outputs.environment }}
          path: .azure/

      - name: AZD Deploy
        env:
          AZURE_ENV_NAME: ${{ needs.setup.outputs.environment }}
          AZURE_LOCATION: ${{ vars.AZURE_LOCATION }}
          AZURE_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
        run: |
          azd auth login \
            --client-id "${{ secrets.AZURE_CLIENT_ID }}" \
            --federated-credential-provider "github" \
            --tenant-id "${{ secrets.AZURE_TENANT_ID }}"

          azd env select ${{ needs.setup.outputs.environment }}
          azd deploy --no-prompt

      - name: Get endpoints
        id: endpoints
        run: |
          FRONTEND_URL=$(azd env get-values | grep -i "FRONTEND.*URL\|SERVICE_FRONTEND.*ENDPOINT" | head -1 | cut -d= -f2 | tr -d '"' || echo "")
          echo "frontend_url=${FRONTEND_URL}" >> $GITHUB_OUTPUT

      - name: Deployment summary
        run: |
          echo "## Deployment Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Item | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| Environment | \`${{ needs.setup.outputs.environment }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Image Tag | \`${{ needs.setup.outputs.image_tag }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Commit | \`${{ github.sha }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Triggered by | ${{ github.actor }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Frontend URL | ${{ steps.endpoints.outputs.frontend_url }} |" >> $GITHUB_STEP_SUMMARY

  # ── Production Gate (manual approval required) ─────────────────────────────
  deploy-prod:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: [setup, deploy-apps]
    if: ${{ needs.setup.outputs.environment == 'staging' && github.ref == 'refs/heads/main' }}
    environment:
      name: prod

    steps:
      - uses: actions/checkout@v4

      - name: Azure Login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Install Azure Developer CLI
        uses: Azure/setup-azd@v2

      - name: Deploy to Production
        env:
          AZURE_ENV_NAME: prod
          AZURE_LOCATION: ${{ vars.AZURE_LOCATION }}
          AZURE_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
        run: |
          azd auth login \
            --client-id "${{ secrets.AZURE_CLIENT_ID }}" \
            --federated-credential-provider "github" \
            --tenant-id "${{ secrets.AZURE_TENANT_ID }}"

          azd env new prod || true
          azd env select prod
          azd env set AZURE_LOCATION "${{ vars.AZURE_LOCATION }}"
          azd env config set infra.parameters.adminObjectId "${{ secrets.ADMIN_OBJECT_ID }}"
          azd env config set infra.parameters.environment "prod"
          azd env config set infra.parameters.projectName "damacae"

          azd provision --no-prompt
          azd deploy --no-prompt

      - name: Production deployment summary
        run: |
          echo "## PRODUCTION Deployment Complete" >> $GITHUB_STEP_SUMMARY
          echo "Commit: \`${{ github.sha }}\`" >> $GITHUB_STEP_SUMMARY
          echo "Deployed by: ${{ github.actor }}" >> $GITHUB_STEP_SUMMARY
