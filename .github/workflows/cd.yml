# =============================================================================
# AGENTRA :: CD Pipeline - Deploy to Azure
# =============================================================================
# Flow: Setup -> Build Images -> Provision & Deploy (single job for state)
# Environments: dev (auto on develop), staging (auto on main), prod (manual)
# =============================================================================

name: CD - Deploy to Azure

on:
  push:
    branches:
      - develop
      - main
    paths-ignore:
      - '**.md'
      - 'docs/**'
      - '.vscode/**'
  workflow_dispatch:
    inputs:
      environment:
        description: 'Target environment'
        required: true
        type: choice
        options:
          - dev
          - staging
          - prod
        default: dev
      skip_infra:
        description: 'Skip infrastructure provisioning'
        required: false
        type: boolean
        default: false

concurrency:
  group: deploy-${{ github.event.inputs.environment || (github.ref == 'refs/heads/main' && 'staging') || 'dev' }}
  cancel-in-progress: false

permissions:
  id-token: write
  contents: read

env:
  DOCKER_BUILDKIT: 1

jobs:
  # ── Determine Environment ──────────────────────────────────────────────────
  setup:
    name: Setup
    runs-on: ubuntu-latest
    outputs:
      environment: ${{ steps.env.outputs.environment }}
      image_tag: ${{ steps.env.outputs.image_tag }}
    steps:
      - name: Determine environment
        id: env
        run: |
          if [ "${{ github.event_name }}" == "workflow_dispatch" ]; then
            echo "environment=${{ github.event.inputs.environment }}" >> $GITHUB_OUTPUT
          elif [ "${{ github.ref }}" == "refs/heads/main" ]; then
            echo "environment=staging" >> $GITHUB_OUTPUT
          else
            echo "environment=dev" >> $GITHUB_OUTPUT
          fi
          echo "image_tag=${{ github.sha }}" >> $GITHUB_OUTPUT

  # ── Provision, Build, Push & Deploy (all in one job for AZD state) ─────────
  provision-and-deploy:
    name: Provision & Deploy
    runs-on: ubuntu-latest
    needs: [setup]
    environment:
      name: ${{ needs.setup.outputs.environment }}
      url: ${{ steps.endpoints.outputs.frontend_url }}

    steps:
      - uses: actions/checkout@v4

      - name: Azure Login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Install Azure Developer CLI
        uses: Azure/setup-azd@v2

      - name: Get admin object ID
        id: admin
        run: |
          ADMIN_OID=$(az ad sp show --id ${{ secrets.AZURE_CLIENT_ID }} --query id -o tsv)
          echo "object_id=$ADMIN_OID" >> $GITHUB_OUTPUT

      # ── Infrastructure Provisioning ──────────────────────────────────────
      - name: AZD Provision
        if: ${{ github.event.inputs.skip_infra != 'true' }}
        env:
          AZURE_ENV_NAME: ${{ needs.setup.outputs.environment }}
          AZURE_LOCATION: ${{ vars.AZURE_LOCATION }}
          AZURE_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
        run: |
          azd auth login \
            --client-id "${{ secrets.AZURE_CLIENT_ID }}" \
            --federated-credential-provider "github" \
            --tenant-id "${{ secrets.AZURE_TENANT_ID }}"

          azd env new ${{ needs.setup.outputs.environment }} || true
          azd env select ${{ needs.setup.outputs.environment }}
          azd env set AZURE_LOCATION "${{ vars.AZURE_LOCATION }}"
          azd env config set infra.parameters.adminObjectId "${{ steps.admin.outputs.object_id }}"
          azd env config set infra.parameters.environment "${{ needs.setup.outputs.environment }}"
          azd env config set infra.parameters.projectName "damacae"

          azd provision --no-prompt

      # ── Refresh AZD state (when skipping infra) ─────────────────────────
      - name: Refresh AZD environment
        if: ${{ github.event.inputs.skip_infra == 'true' }}
        env:
          AZURE_ENV_NAME: ${{ needs.setup.outputs.environment }}
          AZURE_LOCATION: ${{ vars.AZURE_LOCATION }}
          AZURE_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
        run: |
          azd auth login \
            --client-id "${{ secrets.AZURE_CLIENT_ID }}" \
            --federated-credential-provider "github" \
            --tenant-id "${{ secrets.AZURE_TENANT_ID }}"

          azd env new ${{ needs.setup.outputs.environment }} || true
          azd env select ${{ needs.setup.outputs.environment }}
          azd env set AZURE_LOCATION "${{ vars.AZURE_LOCATION }}"
          azd env config set infra.parameters.adminObjectId "${{ steps.admin.outputs.object_id }}"
          azd env config set infra.parameters.environment "${{ needs.setup.outputs.environment }}"
          azd env config set infra.parameters.projectName "damacae"

          # Refresh state without deploying new resources
          azd provision --no-prompt --preview || true

      # ── Discover ACR ─────────────────────────────────────────────────────
      - name: Get ACR details
        id: acr
        run: |
          ENV="${{ needs.setup.outputs.environment }}"
          RG="damacae-rg-${ENV}"
          if [ "$ENV" == "prod" ]; then RG="damacae-rg"; fi

          ACR_NAME=$(az acr list -g "$RG" --query "[0].name" -o tsv 2>/dev/null || echo "")
          ACR_SERVER=$(az acr list -g "$RG" --query "[0].loginServer" -o tsv 2>/dev/null || echo "")
          echo "name=${ACR_NAME}" >> $GITHUB_OUTPUT
          echo "login_server=${ACR_SERVER}" >> $GITHUB_OUTPUT
          echo "::notice::ACR: ${ACR_NAME} (${ACR_SERVER})"

      # ── Build & Push Images ──────────────────────────────────────────────
      - name: Login to ACR
        run: az acr login --name ${{ steps.acr.outputs.name }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build & push backend
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          target: backend
          push: true
          tags: |
            ${{ steps.acr.outputs.login_server }}/agentra-backend:${{ needs.setup.outputs.image_tag }}
            ${{ steps.acr.outputs.login_server }}/agentra-backend:latest
          cache-from: type=gha,scope=backend
          cache-to: type=gha,mode=max,scope=backend

      - name: Build & push frontend
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          target: frontend
          push: true
          tags: |
            ${{ steps.acr.outputs.login_server }}/agentra-frontend:${{ needs.setup.outputs.image_tag }}
            ${{ steps.acr.outputs.login_server }}/agentra-frontend:latest
          cache-from: type=gha,scope=frontend
          cache-to: type=gha,mode=max,scope=frontend

      - name: Build & push mcp-server
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          target: mcp-server
          push: true
          tags: |
            ${{ steps.acr.outputs.login_server }}/agentra-mcp:${{ needs.setup.outputs.image_tag }}
            ${{ steps.acr.outputs.login_server }}/agentra-mcp:latest
          cache-from: type=gha,scope=mcp
          cache-to: type=gha,mode=max,scope=mcp

      # ── Deploy Applications ──────────────────────────────────────────────
      - name: AZD Deploy
        run: |
          azd env select ${{ needs.setup.outputs.environment }}
          azd deploy --no-prompt

      - name: Get endpoints
        id: endpoints
        run: |
          FRONTEND_URL=$(azd env get-values | grep -i "FRONTEND.*URL\|SERVICE_FRONTEND.*ENDPOINT" | head -1 | cut -d= -f2 | tr -d '"' || echo "")
          echo "frontend_url=${FRONTEND_URL}" >> $GITHUB_OUTPUT

      - name: Deployment summary
        run: |
          echo "## Deployment Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Item | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| Environment | \`${{ needs.setup.outputs.environment }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Image Tag | \`${{ needs.setup.outputs.image_tag }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Commit | \`${{ github.sha }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Triggered by | ${{ github.actor }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Frontend URL | ${{ steps.endpoints.outputs.frontend_url }} |" >> $GITHUB_STEP_SUMMARY

  # ── Production Gate (manual approval required) ─────────────────────────────
  deploy-prod:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: [setup, provision-and-deploy]
    if: ${{ needs.setup.outputs.environment == 'staging' && github.ref == 'refs/heads/main' }}
    environment:
      name: prod

    steps:
      - uses: actions/checkout@v4

      - name: Azure Login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Install Azure Developer CLI
        uses: Azure/setup-azd@v2

      - name: Provision & Deploy Production
        env:
          AZURE_ENV_NAME: prod
          AZURE_LOCATION: ${{ vars.AZURE_LOCATION }}
          AZURE_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
        run: |
          azd auth login \
            --client-id "${{ secrets.AZURE_CLIENT_ID }}" \
            --federated-credential-provider "github" \
            --tenant-id "${{ secrets.AZURE_TENANT_ID }}"

          azd env new prod || true
          azd env select prod
          azd env set AZURE_LOCATION "${{ vars.AZURE_LOCATION }}"
          azd env config set infra.parameters.adminObjectId "${{ secrets.ADMIN_OBJECT_ID }}"
          azd env config set infra.parameters.environment "prod"
          azd env config set infra.parameters.projectName "damacae"

          azd provision --no-prompt
          azd deploy --no-prompt

      - name: Production deployment summary
        run: |
          echo "## PRODUCTION Deployment Complete" >> $GITHUB_STEP_SUMMARY
          echo "Commit: \`${{ github.sha }}\`" >> $GITHUB_STEP_SUMMARY
          echo "Deployed by: ${{ github.actor }}" >> $GITHUB_STEP_SUMMARY
