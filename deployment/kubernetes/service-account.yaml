# =============================================================================
# DA-MACAÉ :: Service Account with Azure Workload Identity
# =============================================================================
apiVersion: v1
kind: ServiceAccount
metadata:
  name: da-macae-sa
  namespace: da-macae
  labels:
    app.kubernetes.io/name: da-macae
    app.kubernetes.io/component: identity
  annotations:
    azure.workload.identity/client-id: "${AZURE_CLIENT_ID}"
    azure.workload.identity/tenant-id: "${AZURE_TENANT_ID}"
