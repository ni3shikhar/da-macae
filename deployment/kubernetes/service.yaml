# =============================================================================
# DA-MACAÉ v2 :: Services
# =============================================================================

---
# ── Backend Service ──────────────────────────────────────────────────────────
apiVersion: v1
kind: Service
metadata:
  name: da-macae-backend
  namespace: da-macae
  labels:
    app.kubernetes.io/name: da-macae-backend
    app.kubernetes.io/component: api
spec:
  type: ClusterIP
  ports:
    - name: http
      port: 8000
      targetPort: http
      protocol: TCP
  selector:
    app.kubernetes.io/name: da-macae-backend

---
# ── Frontend Service ─────────────────────────────────────────────────────────
apiVersion: v1
kind: Service
metadata:
  name: da-macae-frontend
  namespace: da-macae
  labels:
    app.kubernetes.io/name: da-macae-frontend
    app.kubernetes.io/component: ui
spec:
  type: ClusterIP
  ports:
    - name: http
      port: 80
      targetPort: http
      protocol: TCP
  selector:
    app.kubernetes.io/name: da-macae-frontend

---
# ── MCP Server Service ──────────────────────────────────────────────────────
apiVersion: v1
kind: Service
metadata:
  name: da-macae-mcp
  namespace: da-macae
  labels:
    app.kubernetes.io/name: da-macae-mcp
    app.kubernetes.io/component: tools
spec:
  type: ClusterIP
  ports:
    - name: http
      port: 8001
      targetPort: http
      protocol: TCP
  selector:
    app.kubernetes.io/name: da-macae-mcp
