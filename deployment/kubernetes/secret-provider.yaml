# =============================================================================
# DA-MACAÉ v2 :: Azure Key Vault CSI SecretProviderClass
# =============================================================================
# Mounts secrets from Azure Key Vault into the pod via the Secrets Store
# CSI Driver. Requires:
#   - Azure Key Vault Provider for Secrets Store CSI Driver addon on AKS
#   - Workload Identity configured on the AKS cluster
#
# V2: Added AI Foundry connection string, storage DFS endpoint.
#      Removed Service Bus connection string (V2 uses WebSocket, not AMQP).
# =============================================================================
apiVersion: secrets-store.csi.x-k8s.io/v1
kind: SecretProviderClass
metadata:
  name: da-macae-keyvault
  namespace: da-macae
  labels:
    app.kubernetes.io/part-of: da-macae-platform
    app.kubernetes.io/component: secrets
spec:
  provider: azure
  parameters:
    usePodIdentity: "false"
    useVMManagedIdentity: "false"
    clientID: "${AZURE_CLIENT_ID}"
    keyvaultName: "${KEY_VAULT_NAME}"
    tenantId: "${AZURE_TENANT_ID}"
    objects: |
      array:
        - |
          objectName: azure-openai-endpoint
          objectType: secret
          objectAlias: AZURE_OPENAI_ENDPOINT
        - |
          objectName: azure-openai-api-key
          objectType: secret
          objectAlias: AZURE_OPENAI_API_KEY
        - |
          objectName: azure-cosmos-endpoint
          objectType: secret
          objectAlias: AZURE_COSMOS_ENDPOINT
        - |
          objectName: azure-cosmos-key
          objectType: secret
          objectAlias: AZURE_COSMOS_KEY
        - |
          objectName: applicationinsights-connection-string
          objectType: secret
          objectAlias: APPLICATIONINSIGHTS_CONNECTION_STRING
        - |
          objectName: azure-keyvault-endpoint
          objectType: secret
          objectAlias: AZURE_KEYVAULT_ENDPOINT
        - |
          objectName: azure-storage-connection-string
          objectType: secret
          objectAlias: AZURE_STORAGE_CONNECTION_STRING
        - |
          objectName: ai-foundry-connection-string
          objectType: secret
          objectAlias: AI_FOUNDRY_PROJECT_CONNECTION_STRING
  # Sync as Kubernetes Secret so envFrom can reference it
  secretObjects:
    - secretName: da-macae-secrets
      type: Opaque
      data:
        - objectName: AZURE_OPENAI_ENDPOINT
          key: AZURE_OPENAI_ENDPOINT
        - objectName: AZURE_OPENAI_API_KEY
          key: AZURE_OPENAI_API_KEY
        - objectName: AZURE_COSMOS_ENDPOINT
          key: AZURE_COSMOS_ENDPOINT
        - objectName: AZURE_COSMOS_KEY
          key: AZURE_COSMOS_KEY
        - objectName: APPLICATIONINSIGHTS_CONNECTION_STRING
          key: APPLICATIONINSIGHTS_CONNECTION_STRING
        - objectName: AZURE_KEYVAULT_ENDPOINT
          key: AZURE_KEYVAULT_ENDPOINT
        - objectName: AZURE_STORAGE_CONNECTION_STRING
          key: AZURE_STORAGE_CONNECTION_STRING
        - objectName: AI_FOUNDRY_PROJECT_CONNECTION_STRING
          key: AI_FOUNDRY_PROJECT_CONNECTION_STRING
