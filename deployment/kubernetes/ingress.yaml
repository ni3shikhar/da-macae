# =============================================================================
# DA-MACAÉ v2 :: Ingress (NGINX Ingress Controller)
# =============================================================================
# Routes:
#   /api/*  → backend service (FastAPI, port 8000)
#   /ws/*   → backend service (WebSocket upgrade)
#   /*      → frontend service (Nginx, port 80)
# =============================================================================
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: da-macae
  namespace: da-macae
  labels:
    app.kubernetes.io/name: da-macae
    app.kubernetes.io/component: ingress
  annotations:
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/use-regex: "true"
    nginx.ingress.kubernetes.io/proxy-body-size: "50m"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "300"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "300"
    nginx.ingress.kubernetes.io/proxy-connect-timeout: "60"
    # WebSocket support
    nginx.ingress.kubernetes.io/proxy-http-version: "1.1"
    nginx.ingress.kubernetes.io/upstream-hash-by: "$remote_addr"
    # Rate limiting at ingress level
    nginx.ingress.kubernetes.io/limit-rps: "30"
    nginx.ingress.kubernetes.io/limit-burst-multiplier: "5"
    # CORS
    nginx.ingress.kubernetes.io/enable-cors: "true"
    nginx.ingress.kubernetes.io/cors-allow-origin: "https://da-macae.example.com"
    # Security headers
    nginx.ingress.kubernetes.io/configuration-snippet: |
      more_set_headers "X-Content-Type-Options: nosniff";
      more_set_headers "X-Frame-Options: DENY";
      more_set_headers "X-XSS-Protection: 1; mode=block";
      more_set_headers "Referrer-Policy: strict-origin-when-cross-origin";
    cert-manager.io/cluster-issuer: letsencrypt-prod
spec:
  ingressClassName: nginx
  tls:
    - hosts:
        - da-macae.example.com
      secretName: da-macae-tls
  rules:
    - host: da-macae.example.com
      http:
        paths:
          # API routes → backend
          - path: /api(/|$)(.*)
            pathType: ImplementationSpecific
            backend:
              service:
                name: da-macae-backend
                port:
                  number: 8000
          # WebSocket routes → backend
          - path: /ws(/|$)(.*)
            pathType: ImplementationSpecific
            backend:
              service:
                name: da-macae-backend
                port:
                  number: 8000
          # Everything else → frontend (SPA)
          - path: /
            pathType: Prefix
            backend:
              service:
                name: da-macae-frontend
                port:
                  number: 80
