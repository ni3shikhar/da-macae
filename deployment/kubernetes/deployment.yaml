# =============================================================================
# DA-MACAÉ v2 :: Deployments
# =============================================================================
# Three deployments for the V2 Python/React/MCP architecture:
#   1. backend   — Python/FastAPI API + WebSocket server (port 8000)
#   2. frontend  — React/Vite served by Nginx (port 80)
#   3. mcp-server — FastMCP data-source tool server (port 8001)
#
# Resource sizing rationale:
#   - LLM workloads are I/O-bound (waiting on Azure OpenAI HTTP responses).
#   - Python async (uvicorn) handles concurrency via event loop.
#   - Backend needs memory for concurrent agent sessions + LLM response buffers.
#   - MCP server needs memory for database connections + data processing.
# =============================================================================

---
# ═══════════════════════════════════════════════════════════════════════════
# Backend (Python / FastAPI / Uvicorn)
# ═══════════════════════════════════════════════════════════════════════════
apiVersion: apps/v1
kind: Deployment
metadata:
  name: da-macae-backend
  namespace: da-macae
  labels:
    app.kubernetes.io/name: da-macae-backend
    app.kubernetes.io/version: "2.0.0"
    app.kubernetes.io/component: api
    app.kubernetes.io/managed-by: github-actions
spec:
  replicas: 2
  revisionHistoryLimit: 5
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app.kubernetes.io/name: da-macae-backend
  template:
    metadata:
      labels:
        app.kubernetes.io/name: da-macae-backend
        app.kubernetes.io/version: "2.0.0"
        azure.workload.identity/use: "true"
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8000"
        prometheus.io/path: "/api/v1/health"
    spec:
      serviceAccountName: da-macae-sa
      terminationGracePeriodSeconds: 30
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: backend
          image: damacaeacr.azurecr.io/da-macae-backend:latest
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: 8000
              protocol: TCP
          envFrom:
            - configMapRef:
                name: da-macae-backend-config
            - secretRef:
                name: da-macae-secrets
          env:
            - name: KEY_VAULT_NAME
              value: "damacae-kv"
            - name: AZURE_TENANT_ID
              valueFrom:
                fieldRef:
                  fieldPath: metadata.annotations['azure.workload.identity/tenant-id']
            - name: AZURE_CLIENT_ID
              valueFrom:
                fieldRef:
                  fieldPath: metadata.annotations['azure.workload.identity/client-id']
          resources:
            requests:
              cpu: "500m"
              memory: "2Gi"
            limits:
              cpu: "2000m"
              memory: "4Gi"
          startupProbe:
            httpGet:
              path: /api/v1/health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 5
            failureThreshold: 12
            timeoutSeconds: 5
          livenessProbe:
            httpGet:
              path: /api/v1/health
              port: http
            periodSeconds: 15
            failureThreshold: 3
            timeoutSeconds: 5
          readinessProbe:
            httpGet:
              path: /api/v1/health
              port: http
            periodSeconds: 10
            failureThreshold: 3
            timeoutSeconds: 5
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: false
            capabilities:
              drop:
                - ALL
          volumeMounts:
            - name: secrets-store
              mountPath: "/mnt/secrets-store"
              readOnly: true
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: secrets-store
          csi:
            driver: secrets-store.csi.k8s.io
            readOnly: true
            volumeAttributes:
              secretProviderClass: da-macae-keyvault
        - name: tmp
          emptyDir:
            sizeLimit: 256Mi
      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: topology.kubernetes.io/zone
          whenUnsatisfiable: DoNotSchedule
          labelSelector:
            matchLabels:
              app.kubernetes.io/name: da-macae-backend

---
# ═══════════════════════════════════════════════════════════════════════════
# Frontend (React / Vite / Nginx)
# ═══════════════════════════════════════════════════════════════════════════
apiVersion: apps/v1
kind: Deployment
metadata:
  name: da-macae-frontend
  namespace: da-macae
  labels:
    app.kubernetes.io/name: da-macae-frontend
    app.kubernetes.io/version: "2.0.0"
    app.kubernetes.io/component: ui
    app.kubernetes.io/managed-by: github-actions
spec:
  replicas: 2
  revisionHistoryLimit: 5
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app.kubernetes.io/name: da-macae-frontend
  template:
    metadata:
      labels:
        app.kubernetes.io/name: da-macae-frontend
        app.kubernetes.io/version: "2.0.0"
    spec:
      terminationGracePeriodSeconds: 15
      securityContext:
        runAsNonRoot: false
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: frontend
          image: damacaeacr.azurecr.io/da-macae-frontend:latest
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: 80
              protocol: TCP
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
          startupProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 5
            periodSeconds: 5
            failureThreshold: 6
          livenessProbe:
            httpGet:
              path: /
              port: http
            periodSeconds: 30
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /
              port: http
            periodSeconds: 10
            failureThreshold: 3
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: false
            capabilities:
              drop:
                - ALL

---
# ═══════════════════════════════════════════════════════════════════════════
