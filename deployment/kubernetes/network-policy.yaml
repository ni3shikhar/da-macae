# =============================================================================
# DA-MACAÉ v2 :: Network Policies
# =============================================================================
# Restrict egress to only required Azure services, DNS, and internal services.
# Restrict ingress to only the ingress controller, Prometheus, and internal.
# =============================================================================

---
# ── Default deny all egress for all da-macae pods ───────────────────────────
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: da-macae-default-deny-egress
  namespace: da-macae
  labels:
    app.kubernetes.io/part-of: da-macae-platform
    app.kubernetes.io/component: network-policy
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/part-of: da-macae-platform
  policyTypes:
    - Egress

---
# ── Backend: allow required egress ──────────────────────────────────────────
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: da-macae-backend-egress
  namespace: da-macae
  labels:
    app.kubernetes.io/name: da-macae-backend
    app.kubernetes.io/component: network-policy
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: da-macae-backend
  policyTypes:
    - Egress
  egress:
    # DNS resolution
    - to:
        - namespaceSelector: {}
      ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53

    # Internal: backend → mcp-server
    - to:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: da-macae-mcp
      ports:
        - protocol: TCP
          port: 8001

    # Azure OpenAI, Cosmos DB, Key Vault, Storage, App Insights (HTTPS 443)
    - to:
        - ipBlock:
            cidr: 0.0.0.0/0
      ports:
        - protocol: TCP
          port: 443

    # Cosmos DB Direct mode TCP
    - to:
        - ipBlock:
            cidr: 0.0.0.0/0
      ports:
        - protocol: TCP
          port: 10250
        - protocol: TCP
          port: 10251
        - protocol: TCP
          port: 10252
        - protocol: TCP
          port: 10253
        - protocol: TCP
          port: 10254
        - protocol: TCP
          port: 10255

---
# ── MCP Server: allow required egress ───────────────────────────────────────
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: da-macae-mcp-egress
  namespace: da-macae
  labels:
    app.kubernetes.io/name: da-macae-mcp
    app.kubernetes.io/component: network-policy
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: da-macae-mcp
  policyTypes:
    - Egress
  egress:
    # DNS resolution
    - to:
        - namespaceSelector: {}
      ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53

    # Azure services (HTTPS 443) — OpenAI, Cosmos, Storage, ADLS, etc.
    - to:
        - ipBlock:
            cidr: 0.0.0.0/0
      ports:
        - protocol: TCP
          port: 443

    # External databases — SQL Server, PostgreSQL, MySQL
    - to:
        - ipBlock:
            cidr: 0.0.0.0/0
      ports:
        - protocol: TCP
          port: 1433    # SQL Server / Azure SQL
        - protocol: TCP
          port: 5432    # PostgreSQL
        - protocol: TCP
          port: 3306    # MySQL
        - protocol: TCP
          port: 1521    # Oracle
        - protocol: TCP
          port: 27017   # MongoDB

---
# ── Ingress: allow from NGINX ingress controller ───────────────────────────
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: da-macae-allow-ingress
  namespace: da-macae
  labels:
    app.kubernetes.io/part-of: da-macae-platform
    app.kubernetes.io/component: network-policy
spec:
  podSelector:
    matchExpressions:
      - key: app.kubernetes.io/name
        operator: In
        values:
          - da-macae-backend
          - da-macae-frontend
  policyTypes:
    - Ingress
  ingress:
    # From NGINX ingress controller
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: ingress-nginx
          podSelector:
            matchLabels:
              app.kubernetes.io/name: ingress-nginx
      ports:
        - protocol: TCP
          port: 8000
        - protocol: TCP
          port: 80
    # From Prometheus (metrics scraping)
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: monitoring
          podSelector:
            matchLabels:
              app.kubernetes.io/name: prometheus
      ports:
        - protocol: TCP
          port: 8000
        - protocol: TCP
          port: 8001

---
# ── Internal ingress: backend → mcp-server ─────────────────────────────────
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: da-macae-mcp-allow-internal
  namespace: da-macae
  labels:
    app.kubernetes.io/name: da-macae-mcp
    app.kubernetes.io/component: network-policy
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: da-macae-mcp
  policyTypes:
    - Ingress
  ingress:
    - from:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: da-macae-backend
      ports:
        - protocol: TCP
          port: 8001
